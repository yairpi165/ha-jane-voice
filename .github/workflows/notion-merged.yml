name: Notion — PR Merged to Done
on:
  pull_request:
    types: [closed]

jobs:
  update-notion:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract closing JANE IDs
        id: extract
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          IDS=$(printf '%s\n%s' "$PR_TITLE" "$PR_BODY" \
            | grep -oiP '(fixes|closes|resolves)\s+JANE-\d+' \
            | grep -oP 'JANE-\d+' \
            | sort -u)
          {
            echo "ids<<JANE_IDS_EOF"
            echo "$IDS"
            echo "JANE_IDS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Closing IDs: $IDS"

      - name: Update Notion Status to Done
        if: steps.extract.outputs.ids != ''
        uses: actions/github-script@v7
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          JANE_IDS: ${{ steps.extract.outputs.ids }}
        with:
          script: |
            const ids = process.env.JANE_IDS.split('\n').filter(Boolean);
            for (const janeId of ids) {
              const num = parseInt(janeId.split('-')[1]);

              const search = await fetch(
                `https://api.notion.com/v1/databases/${process.env.NOTION_DB_ID}/query`,
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.NOTION_TOKEN}`,
                    'Notion-Version': '2022-06-28',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    filter: {
                      property: 'Task ID',
                      unique_id: { equals: num }
                    }
                  })
                }
              );
              if (!search.ok) {
                console.error(`Notion search failed for ${janeId}: ${search.status} ${await search.text()}`);
                continue;
              }
              const data = await search.json();
              const page = data.results?.[0];
              if (!page) {
                console.log(`Task ${janeId} not found in Notion`);
                continue;
              }

              const update = await fetch(`https://api.notion.com/v1/pages/${page.id}`, {
                method: 'PATCH',
                headers: {
                  'Authorization': `Bearer ${process.env.NOTION_TOKEN}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  properties: { Status: { select: { name: 'Done' } } }
                })
              });
              if (!update.ok) {
                console.error(`Notion update failed for ${janeId}: ${update.status} ${await update.text()}`);
                continue;
              }
              console.log(`✅ ${janeId} → Done`);
            }
