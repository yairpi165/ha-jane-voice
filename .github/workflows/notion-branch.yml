name: Notion — Branch to In Progress
on:
  push:
    branches:
      # Conventional Commits prefixes
      - 'feat/JANE-*'
      - 'fix/JANE-*'
      - 'docs/JANE-*'
      - 'style/JANE-*'
      - 'refactor/JANE-*'
      - 'perf/JANE-*'
      - 'test/JANE-*'
      - 'chore/JANE-*'
      - 'ci/JANE-*'
      - 'build/JANE-*'
      - 'revert/JANE-*'
      # Legacy / non-standard prefixes kept for backward compatibility
      - 'feature/JANE-*'
      - 'bug/JANE-*'
      - 'improvement/JANE-*'
      # Bare ticket-key branch
      - 'JANE-*'

jobs:
  update-notion:
    if: github.event.created == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract JANE ID
        id: extract
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          JANE_ID=$(echo "$BRANCH" | grep -oP 'JANE-\d+' | head -1)
          echo "jane_id=$JANE_ID" >> "$GITHUB_OUTPUT"
          echo "Branch: $BRANCH → $JANE_ID"

      - name: Update Notion Status to In Progress
        if: steps.extract.outputs.jane_id != ''
        uses: actions/github-script@v7
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        with:
          script: |
            const janeId = '${{ steps.extract.outputs.jane_id }}';
            const num = parseInt(janeId.split('-')[1]);

            const search = await fetch(
              `https://api.notion.com/v1/databases/${process.env.NOTION_DB_ID}/query`,
              {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.NOTION_TOKEN}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  filter: {
                    property: 'Task ID',
                    unique_id: { equals: num }
                  }
                })
              }
            );
            if (!search.ok) {
              console.error(`Notion search failed: ${search.status} ${await search.text()}`);
              return;
            }
            const data = await search.json();
            const page = data.results?.[0];
            if (!page) {
              console.log(`Task ${janeId} not found in Notion`);
              return;
            }

            const update = await fetch(`https://api.notion.com/v1/pages/${page.id}`, {
              method: 'PATCH',
              headers: {
                'Authorization': `Bearer ${process.env.NOTION_TOKEN}`,
                'Notion-Version': '2022-06-28',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                properties: { Status: { select: { name: 'In Progress' } } }
              })
            });
            if (!update.ok) {
              console.error(`Notion update failed: ${update.status} ${await update.text()}`);
              return;
            }
            console.log(`✅ ${janeId} → In Progress`);
