name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 5"
          prompt: |
            You are reviewing a PR for Jane — a Hebrew AI voice assistant for Home Assistant.

            Review for:
            1. **Architecture** — follows Modular Agent Architecture (see CLAUDE.md)
            2. **File size** — no file should exceed 300 lines (excluding __init__.py)
            3. **Async safety** — no blocking I/O on HA event loop
            4. **Error handling** — log + fallback, never crash
            5. **SOLID** — single responsibility, open/closed
            6. **Type hints** — on every function
            7. **Hebrew** — only in const.py and strings.json, never in code/logs
            8. **Tool design** — handlers are pure: receive (hass, args), return result
            9. **Security** — no hardcoded keys, no injection risks

            Be concise. Focus on real issues, not style nitpicks.
            If the PR looks good, say so briefly.
