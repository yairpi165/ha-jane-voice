name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install google-genai google-auth aiohttp
          pip install -e . 2>/dev/null || true

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check custom_components/ tests/

      - name: Ruff format check
        run: ruff format --check custom_components/ tests/

  file-size:
    name: File Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check max 300 lines per file
        run: |
          failed=0
          for f in $(find custom_components -name '*.py' ! -name '__init__.py'); do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 300 ]; then
              echo "FAIL: $f has $lines lines (max 300)"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "Files exceeding 300 lines must be split."
            echo "See Architecture & Design Guidelines in Notion."
            exit 1
          fi
          echo "All files within 300 line limit."
