name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install google-genai google-auth aiohttp
          pip install -e . 2>/dev/null || true

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_config_api_live.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check custom_components/ tests/ --ignore I001,F401,F403,F841,SIM102,SIM105,SIM117,UP017

      - name: Ruff format check
        run: ruff format --check custom_components/ tests/ || echo "::warning::Format issues found. Run 'ruff format' locally."

  file-size:
    name: File Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check max 300 lines per file
        run: |
          # Exempt: declarative data (tool schemas), slightly over-limit handlers
          EXEMPT="definitions.py discovery.py"

          failed=0
          for f in $(find custom_components -name '*.py' ! -name '__init__.py'); do
            basename=$(basename "$f")
            lines=$(wc -l < "$f")

            # Skip exempt files (pre-existing, tracked for refactor)
            if echo "$EXEMPT" | grep -qw "$basename"; then
              if [ "$lines" -gt 300 ]; then
                echo "WARN: $f has $lines lines (exempt — pending refactor)"
              fi
              continue
            fi

            if [ "$lines" -gt 300 ]; then
              echo "FAIL: $f has $lines lines (max 300)"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "Files exceeding 300 lines must be split."
            echo "See Architecture & Design Guidelines in Notion."
            exit 1
          fi
          echo "All files within limit (or exempt)."
